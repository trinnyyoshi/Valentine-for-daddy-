<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>19 Valentine's Days — For Daddy</title>

<style>
:root{
  --bg:#0f0f10;
  --accent:#ff5c8a;
  --soft:#ffd0dc;
  --text:#f7f7f8;
}
html,body{height:100%;margin:0;}
body{
  background: radial-gradient(circle at 10% 20%, rgba(255,92,138,0.08), transparent 14%),
              radial-gradient(circle at 90% 80%, rgba(255,179,193,0.06), transparent 16%),
              var(--bg);
  color:var(--text);
  font-family: Georgia, serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  transition: background 1s ease;
}

.wrap{width:100%;max-width:640px;text-align:center;}

h1{
  margin:0 0 6px;
  color:var(--accent);
  font-size:24px;
}

.subtitle{color:var(--soft);margin:0 0 14px;font-size:14px;}

.card{
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius:16px;
  padding:18px 14px 16px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  transition: opacity 0.6s ease;
}

.envelope-zone{
  position:relative;
  padding-top:70px;
  display:flex;
  justify-content:center;
}

.envelope{
  width:280px;
  height:180px;
  background:#fff;
  border-radius:10px;
  position:relative;
  box-shadow: 0 12px 30px rgba(0,0,0,0.45);
  overflow:hidden;
  transition: transform 0.8s ease;
}

.envelope::before{
  content:"";
  position:absolute;
  left:0; right:0;
  top:0;
  height:110px;
  background: linear-gradient(180deg, #ff5c8a 0%, #ff86a7 100%);
  clip-path: polygon(0 0, 100% 0, 50% 90%);
  transform-origin: 50% 0%;
  transform: rotateX(0deg);
  transition: transform 700ms cubic-bezier(.2,.9,.3,1);
  z-index:3;
}

.envelope.open::before{
  transform: rotateX(170deg) translateY(-12px);
}

.letter{
  position:absolute;
  left:12px; right:12px; top:14px; bottom:12px;
  background:#fff;
  border-radius:8px;
  padding:14px;
  box-sizing:border-box;
  z-index:2;
  opacity:0;
  transform: translateY(10px);
  transition: opacity 350ms ease, transform 600ms ease;
  overflow:auto;
}

.envelope.open .letter{
  opacity:1;
  transform: translateY(-4px);
}

#messageText{
  color:#111;
  font-size:17px;
  line-height:1.6;
  min-height:88px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.controls{
  margin-top:14px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:11px 16px;
  border-radius:12px;
  font-weight:800;
  font-size:15px;
}

.open-btn{ background:var(--accent); color:#fff; }
.next-btn{
  background: transparent;
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--text);
}

.final-screen{
  display:none;
  font-size:22px;
  color:var(--soft);
  margin-top:40px;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="wrap">
  <h1>19 Valentine’s Days Later… 💘</h1>
  <div class="subtitle">Hi Daddy 💛 — your baby made something for you.</div>

  <div class="card" id="card">
    <div class="envelope-zone">
      <div class="envelope" id="envelope">
        <div class="letter">
          <div id="messageText">Tap “Open” to begin 💌</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="open-btn" id="openBtn">Open 💌</button>
      <button class="next-btn" id="nextBtn">Next</button>
    </div>
  </div>

  <div class="final-screen" id="finalScreen">
    Until next year… 💛<br>
    Love you.
  </div>

</div>

<script>

const messages = [
  "Thank you for loving me gently.",
  "Thank you for protecting our family.",
  "Thank you for choosing patience when things felt heavy.",
  "Thank you for working so hard so I could still be here.",
  "Thank you for staying steady when everything felt uncertain.",
  "Thank you for carrying fear quietly so I wouldn’t have to.",
  "I see what you sacrificed.",
  "I see how hard you work.",
  "Because of you, I am still here.",
  "You are my safe place.",
  "You loved me when loving me wasn’t easy.",
  "I am your baby — because you made it safe for me to be.",
  "I am not going anywhere.",
  "19 Valentine’s Days later…",
  "I still look at you like you are my whole world.",
  "Forever yours. 💘"
];

let index = 0;

const envelope = document.getElementById("envelope");
const openBtn = document.getElementById("openBtn");
const nextBtn = document.getElementById("nextBtn");
const messageText = document.getElementById("messageText");
const finalScreen = document.getElementById("finalScreen");
const card = document.getElementById("card");

function openEnvelope(){
  envelope.classList.add("open");
}

function showMessage(){
  if(index < messages.length){
    messageText.textContent = messages[index];
    index++;
  } else {
    // Close envelope and show final message
    envelope.classList.remove("open");
    card.style.opacity = "0";
    setTimeout(()=>{
      card.style.display = "none";
      finalScreen.style.display = "block";
    }, 800);
  }
}

openBtn.addEventListener("click", openEnvelope);
nextBtn.addEventListener("click", showMessage);
envelope.addEventListener("click", showMessage);

</script>

</body>
</html>
